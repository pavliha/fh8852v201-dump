; CV2003 (GC4201AC) sensor configuration for OpenIPC majestic
; Extracted from KEVIEW H43 firmware via Ghidra reverse engineering
;
; Sensor: CV2003 / GC4201AC (Galaxycore rebranded)
; SoC: Fullhan FH8852V201
; Interface: MIPI CSI-2, 1 lane, 800-999 Mbps
; I2C: slave 0x1A (7-bit), 16-bit register addr, 8-bit data

[sensor]
sensor_type = cv2003_mipi
mode = 1                    ; 0=linear, 1=WDR
dpc_mode = 0                ; Dead pixel correction

[mipi]
lane = 1                    ; Single MIPI lane
data_rate = 800             ; Mbps (800-999 range observed)
wdr_mode = none             ; WDR off

[isp]
input_mode = mipi           ; MIPI CSI-2
input_format = bayer        ; Raw Bayer (ISP format 0x203)
data_width = 10             ; 10-bit ADC

[resolution]
width = 1920
height = 1080

[fps]
default = 25
min = 15
max = 30
; Available modes: 15, 20, 25, 30

[i2c]
bus = 0                     ; /dev/i2c-0
address = 0x1a              ; 7-bit slave address
addr_width = 16             ; 16-bit register address
data_width = 8              ; 8-bit register data

[clocks]
sensor_clock = 24000000     ; 24 MHz from cis_clk_out
isp_clock = 214285714       ; ~214 MHz
pixel_clock = 214285714     ; ~214 MHz

[gpio]
reset = 13                  ; GPIO13 — active low, pulse to reset
reset_active = 0            ; Reset is active low
